databases:
  - name: taskmanager-db
    plan: free
    databaseName: taskmanager
    user: taskmanager

services:
  - type: web
    name: taskmanager-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: taskmanager-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: https://your-app.vercel.app
      - key: STORAGE_DIR
        value: /data/attachments
    disk:
      name: attachments
      mountPath: /data/attachments
      sizeGB: 1
